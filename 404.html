<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsureWithCat</title>
    <meta property="og:title" content="InsureWithCat" />
    <meta property="og:site_name" content="InsureWithCat" />
  </head>
  <body>
    <script>
      (function redirectToAppRoot() {
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const basePath = pathParts.length ? `/${pathParts[0]}` : '';
        const nextPath =
          window.location.pathname + window.location.search + window.location.hash;

        window.sessionStorage.setItem('gh-pages-spa-path', nextPath);
        window.location.replace(`${window.location.origin}${basePath}/`);
      })();
    </script>
  </body>
</html>
